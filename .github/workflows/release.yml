name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode release keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Patch build.gradle for release signing
        run: |
          node -e "
          const fs = require('fs');
          let g = fs.readFileSync('android/app/build.gradle', 'utf8');
          g = g.replace(
            '    signingConfigs {\n        debug {',
            \`    signingConfigs {
                  release {
                      storeFile file(\"release.keystore\")
                      storePassword System.getenv(\"KEYSTORE_STORE_PASSWORD\")
                      keyAlias System.getenv(\"KEYSTORE_KEY_ALIAS\")
                      keyPassword System.getenv(\"KEYSTORE_KEY_PASSWORD\")
                  }
                  debug {\`
          );
          g = g.replace(
            /\/\/ Caution[^\n]+\n[^\n]+signed-apk-android[^\n]+\n\s+signingConfig signingConfigs\.debug/,
            'signingConfig signingConfigs.release'
          );
          fs.writeFileSync('android/app/build.gradle', g);
          console.log('Signing config patched');
          "

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Locate and rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" lektio-${{ github.ref_name }}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lektio-${{ github.ref_name }}.apk
          name: Lectio ${{ github.ref_name }}
          body: |
            ## Lectio ${{ github.ref_name }}

            Download the APK below to install on your Android device.

            > **Installing the APK:** Enable "Install from unknown sources" in your Android settings, then open the downloaded APK.
